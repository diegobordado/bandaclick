<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Banda Click 📲</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .form-admin { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .mensaje { text-align: center; color: green; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="form-admin">
        <h2>Añadir Nuevo Local 📍</h2>
        <input type="text" id="nombre" placeholder="Nombre del negocio (ej: Agüero Competición)">
        <input type="text" id="rubro" placeholder="Rubro (ej: taller, kiosco, drugstore)">
        <input type="text" id="whatsapp" placeholder="WhatsApp (ej: +54381...)">
        <input type="text" id="imagen" placeholder="Link de la foto (.jpg)">
        <select id="abierto">
            <option value="true">Abierto</option>
            <option value="false">Cerrado</option>
        </select>
        <button id="btnGuardar">🚀 Cargar a Banda Click</button>
        <p class="mensaje" id="msjExito">¡Local cargado con éxito!</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // USAMOS TU MISMA CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyADScvwwDcuQo2Lb5qqvfju8qKpvhFgWfU",
            authDomain: "banda-click.firebaseapp.com",
            projectId: "banda-click",
            storageBucket: "banda-click.firebasestorage.app",
            messagingSenderId: "615050559741",
            appId: "1:615050559741:web:9702ecfe6e34650072be94"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('btnGuardar').addEventListener('click', async () => {
            const nombre = document.getElementById('nombre').value;
            const rubro = document.getElementById('rubro').value.toLowerCase(); // Para que el buscador no falle
            const whatsapp = document.getElementById('whatsapp').value;
            const imagen = document.getElementById('imagen').value;
            const abierto = document.getElementById('abierto').value === "true";

            try {
                await addDoc(collection(db, "negocios"), {
                    nombre: nombre,
                    rubro: rubro,
                    WhatsApp: whatsapp,
                    imagen: imagen,
                    abierto: abierto
                });
                document.getElementById('msjExito').style.display = 'block';
                // Limpiar formulario
                document.querySelectorAll('input').forEach(i => i.value = '');
            } catch (e) {
                alert("Error al cargar: " + e);
            }
        });
    </script>
</body>
</html>
