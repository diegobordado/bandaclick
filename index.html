<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banda Click 📍</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #fff; margin-bottom: 15px; }
        
        #buscador {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }
        #buscador:focus { border-color: #25D366; }

        /* Contenedor de las tarjetas */
        #listaLocales {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tarjeta-local {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .img-local { 
            width: 100%; 
            border-radius: 10px; 
            height: 200px; 
            object-fit: cover; 
            margin-bottom: 10px; 
        }
        .acciones-local {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }
        .btn-social:hover { transform: scale(1.1); }
        .btn-ws { background-color: #25D366; }
        .btn-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .btn-fb { background-color: #1877F2; }
        .btn-vi { background-color: #ff0000; }
        
        h2 { margin: 10px 0 5px 0; color: #fff; font-size: 22px; }
        p { margin: 5px 0; font-size: 14px; color: #bbb; }
        strong { color: #25D366; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Banda Click 📍</h1>
        <input type="text" id="buscador" placeholder="Buscar taller, kiosco, rubro...">
    </div>

    <div id="listaLocales">Cargando comercios...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADScvwwDcuQo2Lb5qqvfju8qKpvhFgWfU",
            authDomain: "banda-click.firebaseapp.com",
            projectId: "banda-click",
            storageBucket: "banda-click.firebasestorage.app",
            messagingSenderId: "615050559741",
            appId: "1:615050559741:web:9702ecfe6e34650072be94"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const buscador = document.getElementById('buscador');
        let todosLosLocales = [];

        // Escuchar cambios en Firebase (Colección "negocios")
        onSnapshot(collection(db, "negocios"), (snapshot) => {
            todosLosLocales = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizarLocales(todosLosLocales);
        });
function renderizarLocales(lista) {
    const contenedor = document.getElementById('listaLocales');
    contenedor.innerHTML = ''; 

    lista.forEach((local) => {
        // Extraemos los datos de Firebase de forma segura
        const datos = local.data ? local.data() : local; 

        // Empezamos a armar la tarjeta
        let htmlLocal = `
            <div class="tarjeta-local">
                <img src="${datos.imagen}" alt="${datos.nombre}" style="width:100%; border-radius:10px;">
                <h2>${datos.nombre}</h2>
                <p><strong style="color: #00ff88;">Rubro:</strong> ${datos.rubro || 'Comercio'}</p>
                <p><strong style="color: #00ff88;">Dirección:</strong> ${datos.direccion || 'La Banda'}</p>
                
                <div class="acciones-local">
                    <a href="https://wa.me/${datos.whatsapp || datos.WhatsApp}" target="_blank" class="btn-social btn-ws">
                        <i class="fab fa-whatsapp"></i>
                    </a>`;

        // Botón Instagram (Solo aparece si cargaste el link en Firebase)
        if (datos.instagram && datos.instagram !== "") {
            htmlLocal += `
                <a href="${datos.instagram}" target="_blank" class="btn-social btn-ig">
                    <i class="fab fa-instagram"></i>
                </a>`;
        }

        // Botón Video (Solo aparece si cargaste el link en Firebase)
        if (datos.video && datos.video !== "") {
            htmlLocal += `
                <a href="${datos.video}" target="_blank" class="btn-social btn-vi">
                    <i class="fas fa-play"></i>
                </a>`;
        }

        // Cerramos los contenedores
        htmlLocal += `</div></div>`; 
        
        // Inyectamos la tarjeta al contenedor
        contenedor.innerHTML += htmlLocal;
    }); 
}
        
        

        // Lógica del buscador
        buscador.addEventListener('input', (e) => {
            const termino = e.target.value.toLowerCase();
            const filtrados = todosLosLocales.filter(local => 
                local.nombre.toLowerCase().includes(termino) || 
                (local.rubro && local.rubro.toLowerCase().includes(termino))
            );
            renderizarLocales(filtrados);
        });
    </script>
</body>
</html>
